name: CI/CD Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04

    steps:
      # Проверка репозитория
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      # Обновление системы для исправления уязвимостей
      - name: Update system packages
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get autoremove -y
          sudo apt-get clean

      # Установка Go с кэшированием
      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
        with:
          go-version: '1.25'
          cache: true

      # Кэширование Go build
      - name: Cache Go build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Установка зависимостей
      - name: Install dependencies
        run: go mod download

      # Параллельная сборка и тестирование
      - name: Build application
        run: go build -ldflags='-s -w -extldflags "-static"' -o ./tg-rss-app

      - name: Run tests with race detection and coverage
        run: go test -race -coverprofile=coverage.out -v ./...

      # Upload coverage report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          flags: ci-cd
          name: codecov-ci-cd
          fail_ci_if_error: false

      # Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tg-rss-binary
          path: ./tg-rss-app
          retention-days: 7

  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-24.04
    needs: build
    steps:
      # Проверка репозитория
      - name: Checkout code
        uses: actions/checkout@v6

      # Настройка Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Кэширование Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Download build artifact
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: tg-rss-binary

      # Логин в GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Сборка и пуш Docker-образа с оптимизациями
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/news-bot:latest
            ghcr.io/${{ github.repository_owner }}/news-bot:${{ github.sha }}
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/news-bot:latest
          cache-to: |
            type=local,dest=/tmp/.buildx-cache-new,mode=max
            type=inline
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          # Multi-platform build preparation (can be enabled later)
          # platforms: linux/amd64,linux/arm64

  docker-build-analyzer:
    name: Build and Push News Analyzer Image
    runs-on: ubuntu-24.04
    needs: build
    steps:
      # Проверка репозитория
      - name: Checkout code
        uses: actions/checkout@v6

      # Настройка Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Кэширование Docker layers для analyzer
      - name: Cache Docker layers (analyzer)
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache-analyzer
          key: ${{ runner.os }}-buildx-analyzer-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-analyzer-

      # Логин в GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Сборка и пуш образа news-analyzer с оптимизациями
      - name: Build and Push News Analyzer Image
        uses: docker/build-push-action@v6
        with:
          context: ./news-analyzer-python
          file: ./news-analyzer-python/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/news-analyzer:latest
            ghcr.io/${{ github.repository_owner }}/news-analyzer:${{ github.sha }}
          cache-from: |
            type=local,src=/tmp/.buildx-cache-analyzer
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/news-analyzer:latest
          cache-to: |
            type=local,dest=/tmp/.buildx-cache-analyzer-new,mode=max
            type=inline
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  server-setup:
    name: Server Infrastructure Setup (Production Environment)
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && contains(github.event.head_commit.message, '[infra]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Setup Ansible Vault
        run: |
          cd ansible
          # Создаем vault password из GitHub секрета
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_password
          chmod 600 .vault_password

          # Проверяем vault файлы
          if [ -f "inventory/group_vars/all/vault.yml" ]; then
            echo "🔐 Vault файл найден"
            ansible-vault view inventory/group_vars/all/vault.yml --vault-password-file .vault_password > /dev/null && echo "✅ Vault файл корректный" || exit 1
          else
            echo "⚠️ Vault файл не найден, создаем шаблон..."
            mkdir -p inventory/group_vars/all
            # Создаем vault файл с секретами
            {
              echo "# Ansible Vault template - will be encrypted"
              echo "vault_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}"
              echo "vault_postgres_user: ${{ secrets.POSTGRES_USER }}"
              echo "vault_postgres_db: ${{ secrets.POSTGRES_DB }}"
              echo "vault_redis_password: ${{ secrets.REDIS_PASSWORD }}"
              echo "vault_telegram_api_key: ${{ secrets.TELEGRAM_API_KEY }}"
              echo "vault_telegram_signal_api_key: ${{ secrets.TELEGRAM_SIGNAL_API_KEY }}"
            } > inventory/group_vars/all/vault.yml
            # Шифруем файл
            ansible-vault encrypt inventory/group_vars/all/vault.yml --vault-password-file .vault_password
            echo "✅ Vault файл создан и зашифрован"
          fi

      - name: Run Ansible server setup
        env:
          ENVIRONMENT: prod
        run: |
          cd ansible
          # Создаем inventory в директории окружения
          mkdir -p inventory/prod
          cat > inventory/prod/hosts.ini << EOF
          [tg_rss_servers]
          ${{ secrets.SERVER_HOST }} ansible_host=${{ secrets.SERVER_HOST }} ansible_user=${{ secrets.SERVER_USER }} ansible_ssh_private_key_file=/home/runner/.ssh/id_rsa ansible_port=${{ secrets.SERVER_PORT || 22 }}
          EOF

          # Проверяем inventory файл
          echo "📋 Inventory файл (PROD окружение):"
          cat inventory/prod/hosts.ini
          echo ""
          echo "🔑 Проверяем путь к SSH ключу в inventory:"
          grep "ansible_ssh_private_key_file" inventory/prod/hosts.ini || echo "Путь к ключу не найден в inventory"
          echo ""
          echo "🌍 Используемое окружение: $ENVIRONMENT"
          echo ""
          # Настраиваем SSH ключ
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts || true

          # Тестируем SSH подключение
          echo "🔗 Тестируем SSH подключение..."
          ssh -i /home/runner/.ssh/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo '✅ SSH подключение успешно'" || exit 1

          # Запускаем ansible-playbook с vault
          echo "🔧 Версия Ansible: $(ansible-playbook --version | head -1)"
          echo "🔐 Используем Ansible Vault для секретов"
          echo "🌍 Окружение: $ENVIRONMENT (Production)"
          echo "📋 Проверяем роли перед запуском:"
          find ../roles -name "system_optimization" -type d || echo "system_optimization not found in roles"
          echo "🔍 Финальная проверка перед Ansible:"
          echo "Inventory файл:"
          cat inventory/prod/hosts.ini
          echo ""
          echo "Ansible config:"
          cat ansible.cfg
          echo ""
          echo "Environment-specific vars:"
          ls -la inventory/prod/group_vars/ 2>/dev/null || echo "Group vars directory not found"
          echo ""
          # Очищаем кэш Ansible и запускаем playbook с vault
          export ANSIBLE_CACHE_DIR=/tmp/ansible_cache
          rm -rf /tmp/ansible_cache
          echo "🚀 Запуск Ansible в PRODUCTION окружении..."
          echo "📋 Использование inventory: inventory/prod/hosts.ini (из ansible.cfg)"
          ansible-playbook playbooks/server-setup.yml --vault-password-file .vault_password -v

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-24.04
    needs: [docker-build, docker-build-analyzer]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOYMENT_ENABLED == 'true'
    steps:
      # Проверка репозитория
      - name: Checkout code
        uses: actions/checkout@v6

      # Настройка SSH подключения
      - name: Setup SSH connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts || true

      # Создание .env файла для деплоя
      - name: Create .env file
        run: |
          cat > .env << 'EOL'
          # Telegram (основной бот)
          TELEGRAM_API_KEY=${{ secrets.TELEGRAM_API_KEY }}
          # Telegram (бот для отчетов анализа)
          TELEGRAM_SIGNAL_API_KEY=${{ secrets.TELEGRAM_SIGNAL_API_KEY }}

          # PostgreSQL
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}


          # Application
          TZ=Europe/Moscow
          TIMEOUT=60

          # Content scraper configuration
          CONTENT_SCRAPER_INTERVAL=${{ secrets.CONTENT_SCRAPER_INTERVAL }}
          CONTENT_SCRAPER_BATCH=${{ secrets.CONTENT_SCRAPER_BATCH }}
          CONTENT_SCRAPER_CONCURRENT=${{ secrets.CONTENT_SCRAPER_CONCURRENT }}
          GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}

          # News Analyzer API Security
          NEWS_ANALYZER_ADMIN=${{ secrets.NEWS_ANALYZER_ADMIN }}
          NEWS_ANALYZER_PASSWORD=${{ secrets.NEWS_ANALYZER_PASSWORD }}
          EOL

      # Деплой на сервер
      - name: Deploy to server
        env:
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/news-bot:latest
        run: |
          # Подготовка SSH ключа
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts || true

          # Создаем .env файл локально
          cat > /tmp/.env << EOF
          # Telegram (основной бот)
          TELEGRAM_API_KEY=${{ secrets.TELEGRAM_API_KEY }}
          # Telegram (бот для отчетов анализа)
          TELEGRAM_SIGNAL_API_KEY=${{ secrets.TELEGRAM_SIGNAL_API_KEY }}
          # PostgreSQL
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          # Application
          TZ=Europe/Moscow
          TIMEOUT=60
          GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}

          # Content scraper configuration
          CONTENT_SCRAPER_INTERVAL=${{ secrets.CONTENT_SCRAPER_INTERVAL }}
          CONTENT_SCRAPER_BATCH=${{ secrets.CONTENT_SCRAPER_BATCH }}
          CONTENT_SCRAPER_CONCURRENT=${{ secrets.CONTENT_SCRAPER_CONCURRENT }}

          # News Analyzer API Security
          NEWS_ANALYZER_ADMIN=${{ secrets.NEWS_ANALYZER_ADMIN }}
          NEWS_ANALYZER_PASSWORD=${{ secrets.NEWS_ANALYZER_PASSWORD }}
          EOF

          # Сначала логинимся в GitHub Container Registry локально
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          # Копируем Docker config на сервер для доступа к registry
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "mkdir -p ~/.docker" || true
          scp -P $SSH_PORT ~/.docker/config.json $SSH_USER@$SSH_HOST:~/.docker/config.json || true

          # Копируем файлы на сервер
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "mkdir -p ~/news-bot" || true
          scp -P $SSH_PORT docker-compose.yml $SSH_USER@$SSH_HOST:~/news-bot/docker-compose.yml
          scp -P $SSH_PORT /tmp/.env $SSH_USER@$SSH_HOST:~/news-bot/.env

          # Проверяем подключение к серверу
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "echo '✅ SSH connection successful'"

          # Загружаем переменные из .env файла
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "
            set -a
            source ~/news-bot/.env
            set +a
            echo '✅ Environment loaded'
          "

          # Проверяем наличие docker и docker-compose
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "
            echo '🔍 Checking Docker installation...'
            if command -v docker >/dev/null 2>&1 && command -v docker-compose >/dev/null 2>&1; then
              echo '✅ Docker and Docker Compose found'
            else
              echo '❌ Docker or Docker Compose not found'
              exit 1
            fi
          "

          # Основной деплой
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "
            set -e
            set -a
            source ~/news-bot/.env 2>/dev/null || true
            set +a
            echo '🚀 Starting deployment...'

            # Останавливаем контейнеры
            echo '🛑 Stopping containers...'
            docker compose -f ~/news-bot/docker-compose.yml --env-file ~/news-bot/.env down --remove-orphans || true

            # Освобождаем место на диске (избегаем "no space left on device")
            echo '🧹 Очистка неиспользуемых данных Docker...'
            docker container prune -f || true
            docker image prune -a -f || true
            docker builder prune -af || true
            docker system df

            # Проверяем и очищаем повреждённые volumes
            echo '🔧 Checking volumes integrity...'
            if docker volume ls | grep -q db_data; then
              echo '🔍 Checking PostgreSQL volume...'
              if ! docker run --rm -v db_data:/data alpine ls /data/base >/dev/null 2>&1; then
                echo '⚠️ PostgreSQL volume corrupted, recreating...'
                docker volume rm db_data
                docker volume create db_data
                echo '✅ PostgreSQL volume recreated'
              else
                echo '✅ PostgreSQL volume OK'
              fi
            fi

            # Запускаем сервисы
            echo '▶️ Starting services...'
            docker compose -f ~/news-bot/docker-compose.yml --env-file ~/news-bot/.env pull || true
            docker compose -f ~/news-bot/docker-compose.yml --env-file ~/news-bot/.env up -d

            # Ждем запуска
            echo '⏳ Waiting for services...'
            sleep 20

            # Проверяем статус
            echo '📊 Container status:'
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep -E '(bot|db|redis|news-analyzer)' || true

            # Диагностика PostgreSQL (используем пользователя из .env, не postgres)
            echo '🔍 PostgreSQL diagnostics:'
            if docker ps | grep -q db; then
              echo '✅ PostgreSQL container exists'
              docker logs db --tail 10 || true
              echo 'Testing connection...'
              docker exec db pg_isready -U \$POSTGRES_USER -d \$POSTGRES_DB 2>/dev/null && echo '✅ PostgreSQL user/db OK' || echo '❌ PostgreSQL connection failed (проверьте POSTGRES_PASSWORD и volume)'
              docker exec db psql -U \$POSTGRES_USER -d \$POSTGRES_DB -c '\l' 2>/dev/null | head -15 || echo '❌ Cannot list databases'
            else
              echo '❌ PostgreSQL container not found'
              docker logs db --tail 20 || true
              exit 1
            fi

            # Проверяем Redis
            if docker ps | grep -q redis; then
              echo '✅ Redis container running'
              docker exec redis redis-cli ping 2>/dev/null | grep -q PONG && echo '✅ Redis ping OK' || echo '⚠️ Redis ping failed'
            fi

            # Проверяем bot
            if docker ps | grep -q bot; then
              echo '✅ Bot container running'
            else
              echo '❌ Bot container failed to start'
              docker logs bot --tail 20 || true
              exit 1
            fi

            echo '✅ Deployment completed successfully!'
          "
          
      - name: Health Check с автоматическим rollback
        if: success()
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set +e  # Не прерывать при ошибках для rollback
            echo '🔍 Начало health check (60 секунд таймаут)...'
            
            # Получаем предыдущий образ для rollback
            PREVIOUS_IMAGE=$(docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BOT }} --format "{{.Repository}}:{{.Tag}}" | sed -n '2p')
            echo "Предыдущий образ для rollback: $PREVIOUS_IMAGE"
            
            # Ожидание полного запуска
            sleep 15
            
            # Health check с несколькими попытками
            max_attempts=6
            attempt=1
            health_ok=false
            
            while [ $attempt -le $max_attempts ]; do
              echo "Health check попытка $attempt из $max_attempts..."
              
              if curl -f -s http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ Health check успешен"
                health_ok=true
                break
              fi
              
              if [ $attempt -lt $max_attempts ]; then
                echo "⏳ Ожидание 10 секунд..."
                sleep 10
              fi
              
              attempt=$((attempt + 1))
            done
            
            # Rollback при неудаче
            if [ "$health_ok" = "false" ]; then
              echo "❌ Health check не прошел - начало rollback..."
              
              # Логи для диагностики
              echo "📋 Логи бота:"
              docker logs bot --tail 30 2>&1 || true
              
              if [ -n "$PREVIOUS_IMAGE" ]; then
                echo "🔄 Rollback к образу: $PREVIOUS_IMAGE"
                
                cd ~/news-bot
                
                # Останавливаем текущую версию
                docker compose stop bot || true
                docker compose rm -f bot || true
                
                # Обновляем .env для использования предыдущего образа
                sed -i "s|BOT_IMAGE_TAG=.*|BOT_IMAGE_TAG=${PREVIOUS_IMAGE##*:}|" .env || true
                
                # Запускаем предыдущую версию
                docker compose up -d bot
                
                sleep 15
                
                # Проверяем health после rollback
                if curl -f -s http://localhost:8080/health > /dev/null 2>&1; then
                  echo "✅ Сервис восстановлен после rollback"
                  echo "⚠️ Деплой отменен, требуется исправление проблем"
                  exit 0
                else
                  echo "❌ Сервис недоступен даже после rollback"
                  echo "🚨 Требуется срочное ручное вмешательство"
                  exit 1
                fi
              else
                echo "⚠️ Предыдущий образ не найден"
                exit 1
              fi
            fi
            
            # Smoke tests при успешном health check
            echo "🧪 Smoke tests..."
            
            # Metrics endpoint
            if curl -f -s http://localhost:8080/metrics | grep -q "rss_polls_total"; then
              echo "✅ Metrics работают"
            else
              echo "⚠️ Metrics недоступны"
            fi
            
            # API endpoint
            if curl -f -s http://localhost:8080/api/v1/sources > /dev/null 2>&1; then
              echo "✅ API работает"
            else
              echo "⚠️ API недоступен"
            fi
            
            echo "✅ Деплой успешно завершен со всеми проверками"
          
